# Fly.io config for the Spring Boot backend.
# Build comes from the existing Dockerfile in this directory.
#
# App name must be globally unique on Fly. If you change it, also update
# VITE_API_URL in the frontend (.env.production / public/config.json) to match.
app = "doctor-appointment-api"
primary_region = "fra"   # Frankfurt — closest available Fly region to Romania

[build]
  dockerfile = "Dockerfile"

[env]
  # Spring Boot picks these up via relaxed binding; secrets are set separately
  # with `fly secrets set ...` (DB creds + Mailgun key).
  JPA_SHOW_SQL = "false"
  JPA_DDL_AUTO = "update"
  # Let the JVM size its heap to the machine memory instead of a fixed default.
  JAVA_TOOL_OPTIONS = "-XX:MaxRAMPercentage=70 -XX:InitialRAMPercentage=40"

[http_service]
  internal_port = 8080
  force_https = true
  # Keep one machine warm so the first request after idle isn't a cold JVM start.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"   # Spring Boot OOMs on the 256mb default; bump to 1gb if you see OOM kills.
