    # The values after ':' are local-dev defaults only.
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/doctor_appointment_api?useUnicode=true&characterEncoding=utf8&useSSL=false&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:Makona200512}
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
